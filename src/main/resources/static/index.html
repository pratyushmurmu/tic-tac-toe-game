<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe | Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="menu-container">
    <div class="logo" data-text="TIC-TAC-TOE">
        <span class="x-icon">X</span>
        <span class="o-icon">O</span>
        TIC-TAC-TOE
    </div>

    <p>The Ultimate Logic Challenge</p>
    <button id="playBtn" class="play-button">PLAY GAME</button>
</div>

<div class="leaderboard-section">
    <h1>🏆 Tic-Tac-Toe Cloud Leaderboard</h1>
    <div id="leaderboard-container">
        <p>
            X Wins: <span id="xWins">0</span> |
            O Wins: <span id="oWins">0</span> |
            Draws: <span id="draws">0</span>
        </p>
    </div>
</div>

<div class="cursor-dot" id="cursor-dot"></div>
<div class="cursor-outline" id="cursor-outline"></div>

<script src="menu.js"></script>
<script src="cursor.js"></script> </body>
</html>
