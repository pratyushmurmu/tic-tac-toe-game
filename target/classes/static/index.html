<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe | Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="menu-container">
    <div class="logo">
        <span class="x-icon">X</span>
        <span class="o-icon">O</span>
    </div>

    <h1>TIC-TAC-TOE</h1>
    <p>The Ultimate Logic Challenge</p>

    <button id="playBtn" class="play-button">PLAY GAME</button>
</div>

<script src="menu.js"></script>

<h1>🏆 Tic-Tac-Toe Cloud Leaderboard</h1>
<div id="stats">Loading Mumbai Cloud Data...</div>

<script>
    fetch('/api/stats')
        .then(response => response.json())
        .then(data => {
            document.getElementById('stats').innerHTML =
                `X Wins: ${data.xWins} | O Wins: ${data.oWins} | Draws: ${data.draws}`;
        });
</script>
</body>
</html>
